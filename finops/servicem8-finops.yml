description: >-
  FinOps view of ServiceM8 spend. ServiceM8 is billed as a monthly SaaS
  subscription priced on the number of jobs activated per month, with unlimited
  users on every plan. The REST API carries no separate metered fee - API access
  is included with the subscription and governed by rate limits rather than
  usage billing. The variable cost drivers layered on the base subscription are
  (1) job volume above the plan allowance, (2) SMS messages sent via the
  Messaging API beyond the included credit pack, and (3) upgrading tiers to unlock
  features such as Forms, Asset Management, Job Costing, and Knowledge.
notes: >-
  Per-unit overage rates for extra jobs and SMS are not reconciled here; verify on
  the ServiceM8 pricing page. Optimize spend by matching the plan's monthly job
  allowance to actual activated-job volume and by using webhooks instead of
  high-frequency polling (polling does not add fees but can hit rate limits).
