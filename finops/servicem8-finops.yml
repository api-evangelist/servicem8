meters:
- name: subscription_tier
  description: Monthly plan fee (Starter, Growing, Premium, Premium Plus) determined by the monthly job allowance and feature set.
  unit: subscription
  aggregation: max
  dimensions:
  - account
  - plan
- name: jobs_activated
  description: Jobs activated per month; drives which plan tier is required and any overage above the allowance.
  unit: jobs
  aggregation: sum
  dimensions:
  - account
- name: sms_messages
  description: SMS messages sent via the Messaging API; consume the plan's SMS credits and incur charges beyond the pack.
  unit: messages
  aggregation: sum
  dimensions:
  - account
- name: api_requests
  description: REST API requests. Not billed, but bounded by rate limits (180/min, 20,000/day per app per account).
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - application
principles:
- name: Visibility
  description: Track monthly activated-job volume and SMS usage against the plan allowance to see the true cost driver.
- name: Allocation
  description: Attribute the subscription and SMS spend to the trade business unit or franchise account using ServiceM8.
- name: Optimization
  description: Right-size the plan to actual job volume; use included SMS credits deliberately; use webhooks over polling to avoid rate-limit disruption; only upgrade tiers for features you use.
- name: Accountability
  description: Assign an owner to review the monthly ServiceM8 invoice, job-count trend, and any overage before renewal.
