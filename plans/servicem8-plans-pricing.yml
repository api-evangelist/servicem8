specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: ServiceM8
providerId: servicem8
created: '2026-07-03'
modified: '2026-07-03'
reconciled: false
tags:
- Field Service
- Job Management
- Trades
- Scheduling
- Plans
description: >-
  ServiceM8 is sold as a SaaS subscription priced primarily on the number of jobs
  activated per month, not on API usage or per-user seats (all plans include
  unlimited users). The REST API is available across paid plans at no additional
  API fee; API access is a feature of the subscription, subject to the platform's
  rate limits. Plan prices below reflect ServiceM8's publicly listed tiers
  (currency shown in AUD on ServiceM8's site; regional pricing varies). Verify
  current tiers, job counts, and included SMS/AI credits on the ServiceM8 pricing
  page during reconciliation.
notes: >-
  Jobs beyond a plan's monthly allowance and SMS beyond the included credit pack
  are billed as add-ons. There are no contracts, setup fees, or per-user fees.
  A free tier exists for getting started. Prices are indicative and may change.
sources:
- https://www.servicem8.com/pricing
- https://support.servicem8.com/help-center/tips-trick-more/more/what-does-servicem8-cost
- https://developer.servicem8.com/docs/rest-overview
plans:
- id: servicem8-free
  name: Free
  type: free
  description: >-
    Entry tier for trying ServiceM8 with a small monthly job allowance and
    unlimited users. Includes core job management and API access.
  entries:
  - label: Included Jobs
    name: free_jobs
    type: usage
    metric: jobs
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: '0'
    userMultiplied: false
  elements:
  - name: Unlimited Users
  - name: Core Job Management
  - name: REST API Access
- id: servicem8-starter
  name: Starter
  type: paid
  description: >-
    Small-business tier with unlimited users, a monthly job allowance, included
    SMS credits, and unlimited AI Assists, plus all essential features.
  entries:
