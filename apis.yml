aid: servicem8
url: https://raw.githubusercontent.com/api-evangelist/servicem8/refs/heads/main/apis.yml
name: ServiceM8
kind: company
description: ServiceM8 is field service and job management software for trade and
  home-service businesses - electricians, plumbers, HVAC, cleaners, landscapers, and
  similar contractors. It manages the full job lifecycle from lead and quote through
  scheduling, dispatch, on-site work, materials, invoicing, and payment. ServiceM8
  publishes a documented REST API at https://api.servicem8.com/api_1.0 that exposes
  its core objects - Jobs, Job Activities, Clients (Companies), Contacts, Staff,
  Materials, Job Materials, Attachments, Queues, Vendors, and Badges - as plain JSON
  over HTTP using GET, POST, and DELETE. Private integrations authenticate with an
  API key (X-API-Key header); public add-ons use OAuth 2.0. Object and event webhook
  subscriptions push change notifications to a callback URL.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Field Service
- Job Management
- Trades
- Scheduling
- Dispatch
- Invoicing
- Home Services
created: '2026-07-03'
modified: '2026-07-03'
